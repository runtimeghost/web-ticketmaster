{% extends 'base.html' %}

{% block title %}Login — Ticket Master{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <div class="card-header">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Log in to your account to continue booking</p>
        </div>
        <div class="card-body">
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" required placeholder="Enter your email" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button class="btn btn-primary btn-lg" type="submit" style="width: 100%;">Log In</button>
            </form>
        </div>
        <div class="card-footer auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Create one now</a></p>
        </div>
    </div>
</div>
{% endblock %}
